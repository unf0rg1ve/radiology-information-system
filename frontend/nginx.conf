server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Stone Web Viewer app.json — генерируем конфигурацию для вьюера
    location = /stone-webviewer/app.json {
        default_type application/json;
        return 200 '{"StoneWebViewer":{"OrthancApiRoot":"/","DicomWebRoot":"/dicom-web","DicomCacheSize":128,"CombinedToolEnabled":true,"CombinedToolBehaviour":{"LeftMouseButton":"Windowing","MiddleMouseButton":"Pan","RightMouseButton":"Zoom"},"PrintEnabled":true,"DownloadAsJpegEnabled":true,"DownloadStudyEnabled":true,"DownloadDicomDir":false,"InstitutionLogo":"","SkipSeriesFromModalities":["SR","SEG","PR"],"ShowInfoPanelAtStartup":"User","ShowUserPreferencesButton":true,"ShowNotForDiagnosticUsageDisclaimer":true,"WindowingPresets":[{"Name":"CT Lung","WindowCenter":-400,"WindowWidth":1600},{"Name":"CT Abdomen","WindowCenter":60,"WindowWidth":400},{"Name":"CT Bone","WindowCenter":300,"WindowWidth":1500},{"Name":"CT Brain","WindowCenter":40,"WindowWidth":80},{"Name":"CT Chest","WindowCenter":40,"WindowWidth":400},{"Name":"CT Angio","WindowCenter":300,"WindowWidth":600}]}}';
    }

    # Прокси для Orthanc (Stone Web Viewer, DICOMweb, REST API) к нативному Orthanc
    location ~ ^/(stone-webviewer|dicom-web|wado|tools|studies|series|instances|patients|modalities|system|changes)(/|$) {
        proxy_pass http://host.docker.internal:8043;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
